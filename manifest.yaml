display_information:
  name: Poll Bot
  description: Polls with click-to-vote buttons and live tallies
  background_color: "#2c3e50"
features:
  bot_user:
    display_name: Poll Bot
    always_online: true
  slash_commands:
    - command: /poll
      url: https://YOUR-DOMAIN/slack/events
      description: Create a poll
      usage_hint: '"Question?" "Option 1" "Option 2" ...'
oauth_config:
  scopes:
    bot:
      - chat:write
      - chat:write.public
      - commands
settings:
  interactivity:
    is_enabled: true
    request_url: https://YOUR-DOMAIN/slack/events
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false