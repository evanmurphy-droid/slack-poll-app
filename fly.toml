# fly.toml app configuration file generated for slack-poll-app on 2026-05-21T10:34:25-05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'slack-poll-app'
primary_region = 'dfw'

[build]

[env]
  DATABASE_URL = 'sqlite:////data/polls.db'
  RUN_SCHEDULER = '1'

[[mounts]]
  source = 'polls_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/healthz'

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
